<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>gremlin overlay</title>
  <style>
    html, body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      /* the whole page is a ghost… */
      pointer-events: none;
      user-select: none;
      cursor: default;
    }
    /* …except the things you're meant to click */
    .hittable {
      pointer-events: auto;
      position: absolute;
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
